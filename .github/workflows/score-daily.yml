name: Daily Scoring

on:
  schedule:
    # Täglich 09:23 UTC. ENTSO-E veröffentlicht Actual Total Load (6.1.A)
    # regulatorisch bis H+1, real treten aber TSO-Verzögerungen, fehlende
    # Stunden und „HTTP 200 + No matching data" auf. 09:xx UTC gibt ~8 h
    # Sicherheitsmarge nach der H+1-Frist der letzten UTC-Stunde (01:00 UTC),
    # ergänzt durch Retry/Backoff + Catch-up in score_day.py.
    # Minute 23 statt 00: GitHub stellt scheduled runs zur vollen Stunde
    # (Lastspitze) regelmäßig verzögert in die Queue oder lässt sie ganz
    # ausfallen. Eine „krumme" Minute abseits :00 reduziert die Drop-Rate.
    - cron: "23 9 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Manueller Score-Lauf für YYYY-MM-DD (leer = gestern UTC)"
        required: false
        default: ""

# Direkter `git push` auf `main` ist durch Branch Protection
# (`required_status_checks: ['validate']`) blockiert.  Wir routen den
# Score-Stand deshalb über einen automatisch erzeugten PR, den die
# pass-through-Variante von `validate-pr.yml` abnickt und der
# `peter-evans/enable-pull-request-automerge`-Schritt anschließend
# squasht.  `pull-requests: write` wird hier zusätzlich benötigt.
permissions:
  contents: write
  pull-requests: write

# Serialisiert Score-Läufe: ein verzögerter Cron- und ein manueller
# workflow_dispatch-Lauf dürfen nicht parallel auf data/scores.parquet
# schreiben (Race/Datenverlust beim append). cancel-in-progress: false,
# damit ein laufender Score nicht abgebrochen wird — der zweite wartet.
concurrency:
  group: score-daily
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    env:
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v5

      - name: GitHub-App-Token erzeugen
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python-Stack
        run: uv sync --frozen

      - name: Zieltag bestimmen
        id: target
        run: |
          if [[ -n "${{ inputs.target_date }}" ]]; then
            DATE="${{ inputs.target_date }}"
          else
            DATE=$(date -u -d "yesterday" +"%Y-%m-%d")
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "[score-daily] Zieltag: $DATE"

      - name: Scoring ausführen
        # --catch-up 3: zusätzlich zum Zieltag jeden noch ungescorten Tag der
        # letzten drei Tage nachscoren, falls ein geplanter Cron-Lauf ausfiel
        # (GitHub verzögert/überspringt scheduled runs unter Last). Klein
        # genug, um nicht versehentlich alte, bewusst ungescorte Tage per
        # LOCF nachzutragen.
        run: uv run python scripts/score_day.py --date "${{ steps.target.outputs.date }}" --catch-up 3

      - name: Ist-Load für Charts nachziehen
        # Hält data/actual_load.parquet (Basis der „Prognose vs. Ist-Last"-
        # Grafik) automatisch aktuell — ersetzt den früheren lokalen
        # Operator-Lauf von fetch_actuals.py (siehe DEPLOYMENT.md).
        # Idempotent: vollständige Tage werden übersprungen, noch nicht
        # publizierte aufgeschoben. --to <Zieltag> vermeidet sinnlose
        # Retries auf den unvollständigen heutigen Tag.
        # continue-on-error: Chart-Daten sind nice-to-have; der Score-PR
        # darf an einem ENTSO-E-Schluckauf hier nicht scheitern.
        continue-on-error: true
        run: uv run python scripts/fetch_actuals.py --to "${{ steps.target.outputs.date }}"

      - name: ENTSO-E-Revisionen prüfen und ggf. neu bewerten
        # ENTSO-E korrigiert veröffentlichte Ist-Lastwerte gelegentlich
        # nachträglich (fehlende TSO-Zonen, implausible Stunden). Vergleicht
        # die letzten 7 benoteten Tage mit data/actual_load.parquet und
        # bewertet abweichende Tage neu — Scores und Ist-Load wandern über
        # denselben PR unten. continue-on-error: best effort wie der
        # Chart-Schritt; das Fenster wird morgen ohnehin erneut geprüft.
        continue-on-error: true
        run: uv run python scripts/revise_scores.py --end "${{ steps.target.outputs.date }}" --window 7

      - name: Score-Stand-PR öffnen
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          add-paths: |
            data/scores.parquet
            data/actual_load.parquet
          branch: bot/scores-${{ steps.target.outputs.date }}
          delete-branch: true
          commit-message: "score: Tageslauf ${{ steps.target.outputs.date }}"
          title: "score: Tageslauf ${{ steps.target.outputs.date }}"
          body: |
            Automatisierter Score-Stand für den Zieltag **${{ steps.target.outputs.date }}**,
            inkl. nachgezogener Ist-Load-Daten (`data/actual_load.parquet`) für die Charts.
            Enthält ggf. Neubewertungen bereits benoteter Tage, falls ENTSO-E
            Ist-Lastwerte nachträglich korrigiert hat (`scripts/revise_scores.py`,
            Details im Workflow-Log).

            Erzeugt von `.github/workflows/score-daily.yml` (`scripts/score_day.py` +
            `scripts/fetch_actuals.py`).
            `validate-pr.yml` nickt diesen PR pass-through ab (keine `submissions/**`-Änderungen);
            anschließend squasht `peter-evans/enable-pull-request-automerge` ihn nach `main`.

      - name: Auto-merge aktivieren
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Kein Score, kein PR
        if: steps.cpr.outputs.pull-request-operation == ''
        run: echo "[score-daily] Keine neuen Scores für ${{ steps.target.outputs.date }} (oder identisch zu HEAD)."
