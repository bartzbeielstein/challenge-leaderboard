name: Build & Deploy Leaderboard

on:
  # ACHTUNG: Kein `workflow_run`-Trigger auf "Daily Scoring"!
  # Daily Scoring pusht den Score-Stand nicht direkt nach `main`, sondern öffnet
  # einen Bot-PR, den `auto-merge.yml` (GitHub-App-Token) mergt. Ein
  # `workflow_run`-Build feuert daher BEVOR dieser Merge landet und rendert die
  # Seite aus dem veralteten (Pre-Merge-)Stand. Er konkurriert dann mit dem
  # korrekten `push`-Build unten in der gemeinsamen "pages"-Concurrency-Gruppe;
  # einer verliert mit „Deployment failed, try again later", und im Zweifel
  # gewinnt der veraltete Build — die Seite zeigt dann den gerade gewerteten Tag
  # NICHT an (beobachtet 2026-07-05). Der Auto-Merge-Push auf
  # `data/scores.parquet` ist der korrekte, eindeutige, race-freie Trigger.
  push:
    branches: [main]
    paths:
      - "data/scores.parquet"
      - "data/actual_load.parquet"
      - "teams.yml"
      - "templates/leaderboard.html.j2"
      - "templates/Certificate.md"
      - "scripts/build_leaderboard.py"
      - "scripts/charts.py"
      - "logo/spotlogo.png"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python-Stack
        run: uv sync --frozen

      - name: Leaderboard rendern
        run: uv run python scripts/build_leaderboard.py

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
